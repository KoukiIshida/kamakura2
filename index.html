<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>謎解きクイズ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container">

    <!-- 読み込みエラー表示 -->
    <section id="screen-error" class="card hidden">
      <h1 class="title">読み込みエラー</h1>
      <p id="error-message" class="lead"></p>
      <p class="note">
        ※ HTMLファイルを直接ダブルクリックで開くと動かないことがあります。<br />
        VS Code の拡張機能「Live Server」で開くか、GitHub Pagesの公開URLから開いてください。
      </p>
    </section>

    <!-- ニックネーム登録画面 -->
    <section id="screen-start" class="card hidden">
      <h1 id="app-title" class="title">謎解きクイズ</h1>
      <p id="app-description" class="lead"></p>
      <label class="field-label" for="nickname-input">ニックネームを入力してください</label>
      <p id="nickname-rule" class="note hidden"></p>
      <input
        id="nickname-input"
        class="text-input"
        type="text"
        maxlength="20"
        placeholder="例：たろう"
        autocomplete="off"
      />
      <p id="nickname-error" class="error-text hidden">ニックネームを入力してください。</p>

      <div id="suffix-area" class="hidden">
        <label class="field-label">呼び方を選んでください</label>
        <div id="suffix-options" class="suffix-options">
          <button type="button" class="suffix-btn" data-suffix="くん">〇〇くん</button>
          <button type="button" class="suffix-btn" data-suffix="ちゃん">〇〇ちゃん</button>
          <button type="button" class="suffix-btn" data-suffix="さん">〇〇さん</button>
          <button type="button" class="suffix-btn" data-suffix="">呼び捨て</button>
        </div>
        <p id="suffix-error" class="error-text hidden">呼び方を選んでください。</p>
      </div>

      <button id="start-button" class="btn btn-primary">スタート</button>
    </section>

    <!-- 問題画面 -->
    <section id="screen-question" class="card hidden">
      <p class="progress"><span id="q-current">1</span> / <span id="q-total">1</span></p>
      <h2 id="q-text" class="question-text"></h2>
      <div id="q-images" class="question-images"></div>

      <div id="answer-area">
        <input
          id="answer-input"
          class="text-input"
          type="text"
          placeholder="答えを入力"
          autocomplete="off"
        />
        <p id="answer-feedback" class="feedback hidden"></p>
        <button id="answer-button" class="btn btn-primary">こたえる</button>
      </div>

      <!-- 答え合わせが無い問題のときに表示 -->
      <button id="next-button" class="btn btn-primary hidden">つぎへ</button>
    </section>

    <!-- クリア画面 -->
    <section id="screen-clear" class="card hidden">
      <h1 class="title">クリア！🎉</h1>
      <p id="clear-message" class="lead"></p>
      <button id="restart-button" class="btn btn-secondary">もう一度あそぶ</button>
    </section>

  </main>

  <script src="js/common.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
